# =============================================================================
#  render.yaml — Cartola FC Analytics (plano Free — sem Disk)
#
#  No plano gratuito o Render não suporta Persistent Disk.
#  Os dados são gerados dentro do container a cada deploy (~3-4 min).
#  Para persistência real, faça upgrade para o plano Starter ($7/mês)
#  e descomente o bloco "disk:" abaixo.
# =============================================================================

services:

  - type: web
    name: cartola-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    branch: main

    envVars:
      # Sem Disk: paths apontam para dentro do container (ephemeral)
      - key: RENDER_DISK_PATH
        value: /app/data
      - key: RENDER_MODELS_PATH
        value: /app/models
      - key: RENDER_LOGS_PATH
        value: /app/logs
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false

    healthCheckPath: /_stcore/health

    # ── Para persistência (plano Starter+), descomente: ──────────────────────
    # disk:
    #   name: cartola-data
    #   mountPath: /var/data
    #   sizeGB: 1
    # E troque os RENDER_DISK_PATH / RENDER_MODELS_PATH / RENDER_LOGS_PATH
    # para /var/data, /var/data/models e /var/data/logs respectivamente.
