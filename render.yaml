# =============================================================================
#  render.yaml — Cartola FC Analytics
#  Blueprint declarativo: define todos os serviços e o Disk persistente.
#
#  Como usar:
#    1. Suba este repositório no GitHub
#    2. No Render: New → Blueprint → conecte o repositório
#    3. O Render lê este arquivo e cria tudo automaticamente
# =============================================================================

services:

  # ── Serviço 1: Dashboard Streamlit ─────────────────────────────────────────
  - type: web
    name: cartola-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon          # oregon (US West) ou frankfurt (Europa)
    plan: free              # free | starter ($7/mês) | standard ($25/mês)
    branch: main

    # Variáveis de ambiente injetadas no container
    envVars:
      - key: RENDER_DISK_PATH
        value: /var/data
      - key: RENDER_MODELS_PATH
        value: /var/data/models
      - key: RENDER_LOGS_PATH
        value: /var/data/logs
      - key: PYTHONUNBUFFERED
        value: "1"
      # Credenciais opcionais — configure manualmente no painel do Render
      # (nunca commitar valores reais aqui)
      - key: TWITTER_BEARER_TOKEN
        sync: false         # o Render pedirá o valor manualmente
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false

    # Health check — Render verifica se o serviço está respondendo
    healthCheckPath: /_stcore/health

    # Disk persistente montado em /var/data
    # Aqui ficam: parquets, modelos .pkl, banco SQLite, logs
    disk:
      name: cartola-data
      mountPath: /var/data
      sizeGB: 1             # 1GB gratuito no plano free

  # ── Serviço 2: API FastAPI (opcional) ──────────────────────────────────────
  # Descomente para subir a API REST separadamente.
  # Se quiser tudo em um serviço só, comente esta seção.
  #
  # - type: web
  #   name: cartola-api
  #   runtime: docker
  #   dockerfilePath: ./Dockerfile.api
  #   region: oregon
  #   plan: free
  #   branch: main
  #   startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
  #   envVars:
